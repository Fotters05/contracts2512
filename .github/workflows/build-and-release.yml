name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Триггер на теги типа v1.0.0, v1.1.0 и т.д.

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Install Squirrel CLI
      run: |
        # Скачиваем Squirrel CLI из NuGet пакета
        nuget install Clowd.Squirrel -Version 2.11.1 -OutputDirectory tools
        # Добавляем в PATH
        $squirrelPath = (Get-ChildItem -Path "tools/Clowd.Squirrel.*/tools" -Recurse -Directory | Select-Object -First 1).FullName
        echo $squirrelPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh
      
    - name: Restore dependencies
      run: dotnet restore Contract2512.csproj
      
    - name: Create .env file
      run: |
        @"
        # GitHub Auto-Update Settings
        GITHUB_OWNER=Fotters05
        GITHUB_REPO=contracts2512
        GITHUB_TOKEN=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
        "@ | Out-File -FilePath .env -Encoding UTF8
      shell: pwsh
      
    - name: Build and Publish
      run: dotnet publish Contract2512.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=false -p:CopyLocalLockFileAssemblies=true
      
    - name: List NuGet cache contents for diagnostics
      run: |
        Write-Host "🔍 ДИАГНОСТИКА: Содержимое NuGet кэшей" -ForegroundColor Cyan
        
        $paths = @(
          "$env:USERPROFILE\.nuget\packages",
          "C:\Users\runneradmin\.nuget\packages",
          "$env:ProgramData\NuGet\packages"
        )
        
        foreach ($path in $paths) {
          if (Test-Path $path) {
            Write-Host "`n📁 Содержимое: $path" -ForegroundColor Yellow
            Get-ChildItem -Path $path -Directory | Select-Object -First 20 | ForEach-Object { Write-Host "  - $($_.Name)" }
            
            # Проверяем есть ли папка clowd.squirrel
            $clowdPath = Join-Path $path "clowd.squirrel"
            if (Test-Path $clowdPath) {
              Write-Host "`n✅ Найдена папка clowd.squirrel в $path" -ForegroundColor Green
              Get-ChildItem -Path $clowdPath -Recurse | Select-Object -First 10 | ForEach-Object { Write-Host "    $($_.FullName)" }
            }
          } else {
            Write-Host "`n❌ Путь не существует: $path" -ForegroundColor Red
          }
        }
      shell: pwsh
      
    - name: Copy SquirrelLib.dll to publish folder
      run: |
        Write-Host "🔍 Поиск SquirrelLib.dll в NuGet кэше..." -ForegroundColor Cyan
        
        # Ищем SquirrelLib.dll в NuGet кэше
        $nugetPath = "$env:USERPROFILE\.nuget\packages\clowd.squirrel\2.11.1\lib"
        
        if (Test-Path $nugetPath) {
          Write-Host "✅ Папка NuGet найдена: $nugetPath" -ForegroundColor Green
          
          # Ищем SquirrelLib.dll (используем net6.0 версию для совместимости с .NET 8)
          $dllPath = Join-Path $nugetPath "net6.0\SquirrelLib.dll"
          
          if (Test-Path $dllPath) {
            Write-Host "✅ SquirrelLib.dll найден: $dllPath" -ForegroundColor Green
            
            # Копируем в publish папку
            $publishPath = "bin/Release/net8.0-windows/win-x64/publish"
            Copy-Item $dllPath -Destination $publishPath -Force
            Write-Host "✅ SquirrelLib.dll скопирован в $publishPath" -ForegroundColor Green
            
            # ДИАГНОСТИКА: Проверяем что файл действительно скопирован
            $copiedDll = Join-Path $publishPath "SquirrelLib.dll"
            if (Test-Path $copiedDll) {
              $fileInfo = Get-Item $copiedDll
              Write-Host "✅ ПОДТВЕРЖДЕНИЕ: SquirrelLib.dll существует в publish папке" -ForegroundColor Green
              Write-Host "   Размер: $($fileInfo.Length) байт" -ForegroundColor Green
              Write-Host "   Полный путь: $($fileInfo.FullName)" -ForegroundColor Green
            } else {
              Write-Host "❌ ОШИБКА: SquirrelLib.dll НЕ найден после копирования!" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "❌ SquirrelLib.dll НЕ найден по пути: $dllPath" -ForegroundColor Red
            Write-Host "Содержимое $nugetPath :" -ForegroundColor Yellow
            Get-ChildItem -Path $nugetPath -Recurse | Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }
        } else {
          Write-Host "❌ Папка NuGet НЕ найдена: $nugetPath" -ForegroundColor Red
          exit 1
        }
      shell: pwsh
      
    - name: Verify publish folder contents before Squirrel pack
      run: |
        Write-Host "📁 ДИАГНОСТИКА: Содержимое publish папки ПЕРЕД созданием Squirrel пакета:" -ForegroundColor Cyan
        $publishPath = "bin/Release/net8.0-windows/win-x64/publish"
        Get-ChildItem -Path $publishPath | Format-Table Name, Length -AutoSize
        
        # Проверяем наличие SquirrelLib.dll
        $dllPath = Join-Path $publishPath "SquirrelLib.dll"
        if (Test-Path $dllPath) {
          Write-Host "✅ SquirrelLib.dll ПРИСУТСТВУЕТ в publish папке" -ForegroundColor Green
        } else {
          Write-Host "❌ SquirrelLib.dll ОТСУТСТВУЕТ в publish папке!" -ForegroundColor Red
          exit 1
        }
      shell: pwsh
      
    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh
      
    - name: Create Squirrel Release
      run: |
        # Находим squirrel.exe
        $squirrelExe = Get-ChildItem -Path "tools" -Filter "squirrel.exe" -Recurse | Select-Object -First 1
        & $squirrelExe.FullName pack `
          --packId Contract2512 `
          --packVersion ${{ steps.get_version.outputs.VERSION }} `
          --packDirectory bin/Release/net8.0-windows/win-x64/publish `
          --releaseDir releases `
          --icon progaico.ico `
          --appIcon progaico.ico `
          --splashImage splash.png `
          --allowUnaware
      shell: pwsh
      
    - name: List created files
      run: |
        Write-Host "Содержимое папки releases:" -ForegroundColor Cyan
        Get-ChildItem -Path releases -Recurse | Format-Table Name, Length
      shell: pwsh
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          releases/*Setup.exe
          releases/*.nupkg
          releases/RELEASES
        body: |
          ## 🎉 Версия ${{ steps.get_version.outputs.VERSION }}
          
          ### Установка:
          1. Скачайте установщик (Setup.exe)
          2. Запустите установщик
          3. Приложение автоматически установится и создаст ярлыки
          
          ### Обновление:
          Если у вас уже установлена предыдущая версия - просто запустите приложение, оно автоматически предложит обновиться.
          
          ### Что нового:
          - Настроена система автоматического обновления
          - Улучшения производительности
          - Исправления ошибок
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
