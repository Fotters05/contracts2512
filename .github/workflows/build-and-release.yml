name: Build and Release with Clowd.Squirrel

# Запускается при push тега вида v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore Contract2512.csproj
      
    - name: Build Release
      run: dotnet build Contract2512.csproj -c Release
      
    - name: Publish Release
      run: dotnet publish Contract2512.csproj -c Release -r win-x64 --self-contained false -o ./publish --no-build
      
    - name: Install Clowd.Squirrel
      run: dotnet tool install --global Clowd.Squirrel --version 2.11.1
      
    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref }}".Replace("refs/tags/v", "")
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh
      
    - name: Create Squirrel Release
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        squirrel pack --packId Contract2512 --packVersion $version --packDirectory ./publish --releaseDir ./releases --icon progaico.ico
      shell: pwsh
      
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          ## 🎉 Новая версия Contract2512 v${{ steps.get_version.outputs.VERSION }}
          
          ### Установка:
          
          **Первая установка:**
          1. Скачайте `Setup.exe`
          2. Запустите установщик
          3. Приложение установится автоматически и создаст ярлык на рабочем столе
          
          **Обновление:**
          - Если у вас уже установлена предыдущая версия, просто запустите приложение
          - Обновление произойдёт автоматически в фоне
          
          ### Что нового:
          - Автоматическая установка и обновление через Squirrel
          - Улучшения производительности
          - Исправления ошибок
        files: |
          ./releases/Setup.exe
          ./releases/RELEASES
          ./releases/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
