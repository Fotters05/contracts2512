name: Build and Release with Clowd.Squirrel

# Запускается при push тега вида v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore Contract2512.csproj
      
    - name: Publish Release (без предварительной сборки)
      run: dotnet publish Contract2512.csproj -c Release -r win-x64 --self-contained false -o ./publish
      
    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref }}".Replace("refs/tags/v", "")
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh
      
    - name: Install NuGet CLI
      run: |
        # Устанавливаем NuGet CLI если его нет
        if (-not (Get-Command nuget -ErrorAction SilentlyContinue)) {
          Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
        }
      shell: pwsh
      
    - name: Download and Install Clowd.Squirrel
      run: |
        # Скачиваем Squirrel напрямую из NuGet
        if (Test-Path nuget.exe) {
          .\nuget.exe install Clowd.Squirrel -Version 2.11.1 -OutputDirectory ./tools
        } else {
          nuget install Clowd.Squirrel -Version 2.11.1 -OutputDirectory ./tools
        }
      shell: pwsh
      
    - name: Create Squirrel Release
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $squirrelPath = Get-ChildItem -Path ./tools/Clowd.Squirrel.*/tools/squirrel.exe -Recurse | Select-Object -First 1
        & $squirrelPath pack --packId Contract2512 --packVersion $version --packDirectory ./publish --releaseDir ./releases --icon progaico.ico
      shell: pwsh
      
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          ## 🎉 Новая версия Contract2512 v${{ steps.get_version.outputs.VERSION }}
          
          ### Установка:
          
          **Первая установка:**
          1. Скачайте `Setup.exe`
          2. Запустите установщик
          3. Приложение установится автоматически и создаст ярлык на рабочем столе
          
          **Обновление:**
          - Если у вас уже установлена предыдущая версия, просто запустите приложение
          - Обновление произойдёт автоматически в фоне
          
          ### Что нового:
          - Автоматическая установка и обновление через Squirrel
          - Улучшения производительности
          - Исправления ошибок
        files: |
          ./releases/Setup.exe
          ./releases/RELEASES
          ./releases/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
